services:
  postgres-db:
    image: postgres:16
    container_name: warchest-db
    environment:
      POSTGRES_DB: warchest
      POSTGRES_USER: warchest
      POSTGRES_PASSWORD: warchest
    ports:
      - "5432:5432"
    volumes:
      - warchest-pgdata:/var/lib/postgresql/data
volumes:
  warchest-pgdata:

